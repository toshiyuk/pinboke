<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピンポケ補正ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      width: 100%;
      max-width: 800px;
    }

    .drop-zone {
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 48px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
    }
    .drop-zone.hover { border-color: #4a90e2; background: #f0f6ff; }
    .drop-zone input { display: none; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
      align-items: flex-end;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    label { font-size: 0.8rem; color: #555; }
    input[type=range] { width: 100%; }
    .val { font-size: 0.85rem; font-weight: bold; color: #4a90e2; }

    button#btn {
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button#btn:hover { background: #357abd; }
    button#btn:disabled { background: #aaa; cursor: default; }

    .preview {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .preview-box {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .preview-box span { font-size: 0.8rem; color: #888; }
    .preview-box img {
      max-width: 100%;
      max-height: 360px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      object-fit: contain;
    }

    #download-link {
      display: none;
      margin-top: 12px;
      padding: 8px 20px;
      background: #27ae60;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    #status { margin-top: 12px; font-size: 0.9rem; color: #e74c3c; min-height: 20px; }
  </style>
</head>
<body>
  <h1>ピンポケ補正ツール</h1>
  <p class="subtitle">ぼけた写真をアップロードするとシャープに補正して返します</p>

  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
      <p>ここをクリックまたは画像をドロップ</p>
      <p style="font-size:0.8rem; margin-top:4px;">JPG / PNG / WebP 対応</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>半径 (radius) <span class="val" id="val-radius">1.5</span></label>
        <input type="range" id="radius" min="0.5" max="5" step="0.5" value="1.5">
      </div>
      <div class="control-group">
        <label>強度 (percent) <span class="val" id="val-percent">150</span>%</label>
        <input type="range" id="percent" min="50" max="300" step="10" value="150">
      </div>
      <div class="control-group">
        <label>閾値 (threshold) <span class="val" id="val-threshold">3</span></label>
        <input type="range" id="threshold" min="0" max="10" step="1" value="3">
      </div>
      <button id="btn" disabled>補正する</button>
    </div>

    <p id="status"></p>

    <div class="preview" id="preview" style="display:none">
      <div class="preview-box">
        <span>元の画像</span>
        <img id="img-before" src="" alt="before">
      </div>
      <div class="preview-box">
        <span>補正後</span>
        <img id="img-after" src="" alt="after">
        <a id="download-link" download="sharpened.jpg">ダウンロード</a>
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    const imgBefore = document.getElementById('img-before');
    const imgAfter = document.getElementById('img-after');
    const dlLink = document.getElementById('download-link');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(f) {
      selectedFile = f;
      dropZone.querySelector('p').textContent = f.name;
      btn.disabled = false;
      status.textContent = '';
      preview.style.display = 'none';
      dlLink.style.display = 'none';

      const url = URL.createObjectURL(f);
      imgBefore.src = url;
    }

    ['radius','percent','threshold'].forEach(id => {
      const el = document.getElementById(id);
      const val = document.getElementById('val-' + id);
      el.addEventListener('input', () => val.textContent = el.value);
    });

    btn.addEventListener('click', async () => {
      if (!selectedFile) return;
      btn.disabled = true;
      status.textContent = '処理中...';

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('radius', document.getElementById('radius').value);
      form.append('percent', document.getElementById('percent').value);
      form.append('threshold', document.getElementById('threshold').value);

      try {
        const res = await fetch('/sharpen', { method: 'POST', body: form });
        if (!res.ok) throw new Error('サーバーエラー: ' + res.status);

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        imgAfter.src = url;

        const ext = selectedFile.name.toLowerCase().endsWith('.png') ? 'png' : 'jpg';
        dlLink.href = url;
        dlLink.download = 'sharpened.' + ext;
        dlLink.style.display = 'inline-block';

        preview.style.display = 'flex';
        status.textContent = '';
      } catch (e) {
        status.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
